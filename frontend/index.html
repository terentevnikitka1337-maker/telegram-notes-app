<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заметки</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2ea6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .notes {
            margin-top: 25px;
        }

        .note {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Мои заметки</h1>
    <div class="subtitle">Быстрые заметки внутри Telegram</div>

    <textarea id="noteText" placeholder="Напиши заметку..."></textarea>
    <button onclick="saveNote()">Сохранить заметку</button>

    <div class="notes" id="notesList"></div>
</div>

<script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
        tg.expand();
    }

    const API_URL = "http://127.0.0.1:8000";

    async function loadNotes() {
        const notesList = document.getElementById("notesList");
        notesList.innerHTML = "Загрузка заметок...";

        try {
            const response = await fetch(`${API_URL}/notes`);
            const notes = await response.json();

            notesList.innerHTML = "";

            if (notes.length === 0) {
                notesList.innerHTML = "<p>Заметок пока нет</p>";
                return;
            }

            notes.forEach((note) => {
                const div = document.createElement("div");
                div.className = "note";
                div.textContent = note.text;
                notesList.appendChild(div);
            });
        } catch (error) {
            notesList.innerHTML = "<p>Не удалось загрузить заметки</p>";
            console.error(error);
        }
    }

    async function saveNote() {
        const textarea = document.getElementById("noteText");
        const text = textarea.value.trim();

        if (!text) {
            alert("Сначала напиши текст заметки");
            return;
        }

        try {
            await fetch(`${API_URL}/notes`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text: text })
            });

            textarea.value = "";
            loadNotes();
        } catch (error) {
            alert("Ошибка при сохранении заметки");
            console.error(error);
        }
    }

    loadNotes();
</script>
</body>
</html>
