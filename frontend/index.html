<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заметки</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-family: Arial, sans-serif;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 9px 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 5px;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: #2ea6ff;
            font-size: 16px;
            margin-right: 0;
        }

        .back-btn {
            background: #777;
            margin-bottom: 15px;
        }

        .edit-btn {
            background: #2ea6ff;
        }

        .delete-btn {
            background: #ff4d4d;
        }

        .cancel-btn {
            background: #777;
        }

        .pin-btn {
            background: #f5a623;
        }

        .notes {
            margin-top: 25px;
        }

        .note {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            cursor: pointer;
        }

        .note:hover {
            background: #fafafa;
        }

        .note-pinned {
            border: 2px solid #f5a623;
            background: #fffaf0;
        }

        .note-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 6px;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .note-text {
            font-size: 15px;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .note-preview {
            font-size: 15px;
            color: #333;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .note-date {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        .form-error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
        }

        .empty-text {
            color: #666;
            font-size: 15px;
        }

        .delete-warning {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff4d4d;
        }

        .pin-label {
            color: #f5a623;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .view-page {
            background: white;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #ddd;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .view-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 14px;
            line-height: 1.25;
        }

        .view-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 18px;
            white-space: pre-wrap;
        }

        .view-date {
            font-size: 12px;
            color: #777;
            padding-top: 12px;
            border-top: 1px solid #eee;
            margin-bottom: 12px;
        }

        .view-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .view-actions button {
            margin-top: 0;
            margin-right: 0;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>Мои заметки</h1>
    <div class="subtitle">Быстрые заметки внутри Telegram</div>

    <input
        type="text"
        id="noteTitle"
        placeholder="Заголовок заметки..."
    >

    <textarea id="noteText" placeholder="Напиши заметку..."></textarea>

    <button class="save-btn" onclick="saveNote()">Сохранить заметку</button>

    <div id="formError" class="form-error"></div>

    <input
        type="text"
        id="searchInput"
        placeholder="Поиск заметки..."
        style="margin-top: 20px;"
    >

    <div class="notes" id="notesList"></div>
</div>

<script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
        tg.expand();
    }

    const API_URL = "https://telegram-notes-app-5wnw.onrender.com";

    let userId = 0;
    let allNotes = [];

    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userId = tg.initDataUnsafe.user.id;
    } else {
        userId = 123;
    }

    function getAppContainer() {
        return document.getElementById("app");
    }

    function getPreviewText(text, maxLength = 140) {
        if (!text) {
            return "";
        }

        if (text.length <= maxLength) {
            return text;
        }

        return text.slice(0, maxLength) + "...";
    }

    function showMainPage() {
        const app = getAppContainer();

        app.innerHTML = `
            <h1>Мои заметки</h1>
            <div class="subtitle">Быстрые заметки внутри Telegram</div>

            <input
                type="text"
                id="noteTitle"
                placeholder="Заголовок заметки..."
            >

            <textarea id="noteText" placeholder="Напиши заметку..."></textarea>

            <button class="save-btn" onclick="saveNote()">Сохранить заметку</button>

            <div id="formError" class="form-error"></div>

            <input
                type="text"
                id="searchInput"
                placeholder="Поиск заметки..."
                style="margin-top: 20px;"
            >

            <div class="notes" id="notesList"></div>
        `;

        setupSearch();
        loadNotes();
    }

    function setupSearch() {
        const searchInput = document.getElementById("searchInput");

        if (searchInput) {
            searchInput.addEventListener("input", () => {
                const query = searchInput.value.toLowerCase();
                const notes = document.querySelectorAll(".note");

                notes.forEach(note => {
                    const title = note.querySelector(".note-title")?.textContent.toLowerCase() || "";
                    const text = note.querySelector(".note-preview")?.textContent.toLowerCase() || "";
                    const fullText = title + " " + text;

                    note.style.display = fullText.includes(query) ? "block" : "none";
                });
            });
        }
    }

    function showFormError(message) {
        const errorDiv = document.getElementById("formError");

        if (errorDiv) {
            errorDiv.textContent = message;
        }
    }

    function clearFormError() {
        const errorDiv = document.getElementById("formError");

        if (errorDiv) {
            errorDiv.textContent = "";
        }
    }

    function formatDate(dateString) {
        if (!dateString) {
            return "";
        }

        const date = new Date(dateString);

        if (isNaN(date.getTime())) {
            return dateString;
        }

        return date.toLocaleString("ru-RU");
    }

    async function loadNotes() {
        const notesList = document.getElementById("notesList");

        if (!notesList) {
            return;
        }

        notesList.innerHTML = "Загрузка заметок...";

        try {
            const response = await fetch(`${API_URL}/notes?user_id=${userId}`);
            const notes = await response.json();

            allNotes = notes;
            notesList.innerHTML = "";

            if (notes.length === 0) {
                notesList.innerHTML = "<p class='empty-text'>Заметок пока нет</p>";
                return;
            }

            notes.forEach(renderNote);
        } catch (error) {
            notesList.innerHTML = "<p class='empty-text'>Не удалось загрузить заметки</p>";
            console.error(error);
        }
    }

    function renderNote(note) {
        const notesList = document.getElementById("notesList");

        const div = document.createElement("div");
        div.className = note.pinned === 1 ? "note note-pinned" : "note";
        div.id = `note-${note.id}`;
        div.onclick = () => openNotePage(note);

        if (note.pinned === 1) {
            const pinLabel = document.createElement("div");
            pinLabel.className = "pin-label";
            pinLabel.textContent = "📌 Закреплено";
            div.appendChild(pinLabel);
        }

        const titleDiv = document.createElement("div");
        titleDiv.className = "note-title";
        titleDiv.textContent = note.title || "Без заголовка";

        const previewDiv = document.createElement("div");
        previewDiv.className = "note-preview";
        previewDiv.textContent = getPreviewText(note.text);

        const dateDiv = document.createElement("div");
        dateDiv.className = "note-date";
        dateDiv.textContent = formatDate(note.created_at);

        const pinButton = document.createElement("button");
        pinButton.className = "pin-btn";
        pinButton.textContent = note.pinned === 1 ? "Открепить" : "Закрепить";
        pinButton.onclick = (event) => {
            event.stopPropagation();
            togglePin(note.id, note.pinned);
        };

        div.appendChild(titleDiv);
        div.appendChild(previewDiv);
        div.appendChild(dateDiv);
        div.appendChild(pinButton);

        notesList.appendChild(div);
    }

    function openNotePage(note) {
        const app = getAppContainer();

        const pinnedText = note.pinned === 1 ? "<div class='pin-label'>📌 Закреплено</div>" : "";

        app.innerHTML = `
            <button class="back-btn" onclick="showMainPage()">← Назад</button>

            <div class="view-page">
                ${pinnedText}

                <div class="view-title">${escapeHtml(note.title || "Без заголовка")}</div>

                <div class="view-text">${escapeHtml(note.text)}</div>

                <div class="view-date">Создано: ${formatDate(note.created_at)}</div>

                <div class="view-actions">
                    <button class="edit-btn" onclick="showEditFormFromView(${note.id})">Редактировать</button>
                    <button class="delete-btn" onclick="showDeleteFormFromView(${note.id})">Удалить</button>
                </div>
            </div>
        `;
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    function escapeAttribute(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll('"', "&quot;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    function findNoteById(noteId) {
        return allNotes.find(note => note.id === noteId);
    }

    function showEditFormFromView(noteId) {
        const note = findNoteById(noteId);

        if (!note) {
            showMainPage();
            return;
        }

        const app = getAppContainer();

        app.innerHTML = `
            <button class="back-btn" onclick="openNotePage(findNoteById(${noteId}))">← Назад</button>

            <div class="view-page" id="note-${note.id}">
                <div class="form-error" id="viewEditError"></div>

                <input
                    type="text"
                    id="viewEditTitle"
                    placeholder="Заголовок заметки..."
                    value="${escapeAttribute(note.title || "")}"
                >

                <textarea id="viewEditText" style="min-height: 160px;">${escapeHtml(note.text || "")}</textarea>

                <div class="view-actions">
                    <button class="edit-btn" onclick="updateNoteFromView(${note.id})">Сохранить</button>
                    <button class="cancel-btn" onclick="openNotePage(findNoteById(${note.id}))">Отмена</button>
                </div>
            </div>
        `;
    }

    async function updateNoteFromView(noteId) {
        const titleInput = document.getElementById("viewEditTitle");
        const textarea = document.getElementById("viewEditText");
        const errorElement = document.getElementById("viewEditError");

        await updateNote(noteId, titleInput.value, textarea.value, errorElement, true);
    }

    function showDeleteFormFromView(noteId) {
        const note = findNoteById(noteId);

        if (!note) {
            showMainPage();
            return;
        }

        const app = getAppContainer();

        app.innerHTML = `
            <button class="back-btn" onclick="openNotePage(findNoteById(${noteId}))">← Назад</button>

            <div class="view-page">
                <div class="delete-warning">Удалить эту заметку?</div>

                <div class="note-title">${escapeHtml(note.title || "Без заголовка")}</div>
                <div class="note-text">${escapeHtml(note.text)}</div>

                <div class="view-actions">
                    <button class="delete-btn" onclick="deleteNoteFromView(${note.id})">Да, удалить</button>
                    <button class="cancel-btn" onclick="openNotePage(findNoteById(${note.id}))">Отмена</button>
                </div>
            </div>
        `;
    }

    async function deleteNoteFromView(noteId) {
        await deleteNote(noteId, true);
    }

    async function saveNote() {
        const titleInput = document.getElementById("noteTitle");
        const textarea = document.getElementById("noteText");

        const title = titleInput.value.trim();
        const text = textarea.value.trim();

        clearFormError();

        if (!title && !text) {
            showFormError("Напиши заголовок и текст заметки");
            return;
        }

        if (!title) {
            showFormError("Сначала напиши заголовок заметки");
            return;
        }

        if (!text) {
            showFormError("Сначала напиши текст заметки");
            return;
        }

        try {
            await fetch(`${API_URL}/notes`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    user_id: userId,
                    title: title,
                    text: text
                })
            });

            titleInput.value = "";
            textarea.value = "";
            clearFormError();
            loadNotes();
        } catch (error) {
            showFormError("Ошибка при сохранении заметки");
            console.error(error);
        }
    }

    async function updateNote(noteId, newTitle, newText, errorElement, returnToView = false) {
        const title = newTitle.trim();
        const text = newText.trim();

        errorElement.textContent = "";

        if (!title && !text) {
            errorElement.textContent = "Напиши заголовок и текст заметки";
            return;
        }

        if (!title) {
            errorElement.textContent = "Заголовок не может быть пустым";
            return;
        }

        if (!text) {
            errorElement.textContent = "Текст заметки не может быть пустым";
            return;
        }

        try {
            await fetch(`${API_URL}/notes/${noteId}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    user_id: userId,
                    title: title,
                    text: text
                })
            });

            await refreshNotes();

            if (returnToView) {
                openNotePage(findNoteById(noteId));
            } else {
                loadNotes();
            }
        } catch (error) {
            errorElement.textContent = "Ошибка при редактировании заметки";
            console.error(error);
        }
    }

    async function refreshNotes() {
        const response = await fetch(`${API_URL}/notes?user_id=${userId}`);
        allNotes = await response.json();
    }

    async function togglePin(noteId, currentPinned) {
        const newPinned = currentPinned === 1 ? 0 : 1;

        try {
            await fetch(`${API_URL}/notes/${noteId}/pin`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    user_id: userId,
                    pinned: newPinned
                })
            });

            await refreshNotes();
            loadNotes();
        } catch (error) {
            const noteDiv = document.getElementById(`note-${noteId}`);

            if (noteDiv) {
                noteDiv.innerHTML = "<div class='form-error'>Ошибка при закреплении заметки</div>";
            }

            console.error(error);
        }
    }

    async function deleteNote(noteId, returnToList = false) {
        try {
            await fetch(`${API_URL}/notes/${noteId}?user_id=${userId}`, {
                method: "DELETE"
            });

            await refreshNotes();

            if (returnToList) {
                showMainPage();
            } else {
                loadNotes();
            }
        } catch (error) {
            const noteDiv = document.getElementById(`note-${noteId}`);

            if (noteDiv) {
                noteDiv.innerHTML = "<div class='form-error'>Ошибка при удалении заметки</div>";
            }

            console.error(error);
        }
    }

    setupSearch();
    loadNotes();
</script>
</body>
</html>
